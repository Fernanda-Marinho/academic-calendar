name: Atualizar Calendário
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run scraper and persist to Supabase
        run: npm run update-calendars 
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NODE_ENV: production